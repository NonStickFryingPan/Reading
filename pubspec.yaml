name: reading
description: A minimal RSS news aggregator.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webfeed: ^0.7.0
  http: ^1.1.0
  cached_network_image: ^3.3.0
  webview_flutter: ^4.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/feeds.json
    - assets/icon/app_icon.png
